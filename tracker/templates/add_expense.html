<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff6a00, #ee0979);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% }
            50% { background-position: 100% }
            100% { background-position: 0% }
        }
        

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        input {
            background: rgba(255,255,255,0.2) !important;
            border: none !important;
            color: white !important;
        }

        input::placeholder {
            color: #ddd;
        }

        button {
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="card">

    <h3 class="text-center mb-4">💸 Add Expense</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="description" placeholder="Description" class="form-control mb-3">

        <input type="number" name="amount" placeholder="Amount" class="form-control mb-3">

        <input type="text" name="category" placeholder="Category" class="form-control mb-3">

        <input type="date" name="date" class="form-control mb-3">

        <button class="btn btn-light w-100">Add Expense</button>
    </form>

    <div style="text-align: center; margin-top: 15px;">
    <a href="/" class="btn btn-light btn-sm">Back to Dashboard</a>
</div>

</div>

</body>
</html>

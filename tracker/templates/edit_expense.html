<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4f6df5, #3a3fd1, #2c2bbf);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        input {
            background: rgba(255,255,255,0.15) !important;
            border: none !important;
            color: white !important;
        }

        input::placeholder {
            color: #ccc;
        }

        button {
            background: #ffffff;
            color: #333;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .dashboard-btn {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 15px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .dashboard-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="card">

    <!-- Title + Dashboard -->
    <div class="text-center mb-3">
        <h3>✏️ Edit Expense</h3>
        
    </div>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="description" value="{{ expense.description }}" class="form-control mb-3">

        <input type="number" name="amount" value="{{ expense.amount }}" class="form-control mb-3">

        <input type="text" name="category" value="{{ expense.category }}" class="form-control mb-3">

        <input type="date" name="date" value="{{ expense.date|date:'Y-m-d' }}" class="form-control mb-3">

        <button class="btn w-100">Update Expense</button>

    </form>

</div>

</body>
</html>
